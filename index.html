<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback</title>

<style>

body {

  margin: 0;

  background: white;

  font-family: Arial, sans-serif;

  display: flex;

  justify-content: center;

  align-items: center;

  height: 100vh;

  overflow: hidden;

}

.container {

  width: 100%;

  max-width: 400px;

  text-align: center;

  position: relative;

}

/* LOGO */

.logo-wrapper {

  position: relative;

  display: inline-block;

}

.logo {

  width: 110px;

  display: block;

}

/* LUCE */

.shine {

  position: absolute;

  top: 0;

  left: -100%;

  width: 100%;

  height: 100%;

  background: linear-gradient(

    120deg,

    transparent 0%,

    rgba(255,255,255,0.8) 50%,

    transparent 100%

  );

  animation: shineMove 1.5s ease forwards;

}

@keyframes shineMove {

  0% { left: -100%; }

  100% { left: 100%; }

}

/* SCOMPARSA LOGO */

.fade-out {

  animation: fadeOut 0.8s ease forwards;

  animation-delay: 1.5s;

}

@keyframes fadeOut {

  to {

    opacity: 0;

    transform: scale(1.1);

  }

}

/* DOMANDA */

.question {

  position: absolute;

  top: -180%;

  left: 50%;

  transform: translateX(-50%);

  opacity: 0;

  font-size: 22px;

  white-space: nowrap;

  font-weight: bold;

  animation: fadeIn 1s ease forwards;

  animation-delay: 2.3s;

}

@keyframes fadeIn {

  to { opacity: 1; }

}

/* CARDS */

.cards {

  position: absolute;

  top: -80%;

  width: 100%;

  display: flex;

  flex-direction: column;

  align-items: center;

  opacity: 0;

  animation: fadeIn 1s ease forwards;

  animation-delay: 2.8s;

}

.card {

  width: 82%;

  display: flex;

  align-items: center;

  justify-content: space-between;

  padding: 28px 22px;

  margin: 14px 0;

  border-radius: 20px;

  background: rgba(0,0,0,0.05);

  cursor: pointer;

  transition: transform 0.2s ease, background 0.2s ease;

}

.card:hover {

  transform: scale(1.05);

  background: rgba(0,0,0,0.08);

}

.card img {

  width: 70px;

  height: 70px;

}

.card span {

  flex: 1;

  text-align: right;

  font-size: 17px;

  font-weight: bold;

}

/* TAG SCREEN */

.tags-container {

  margin-top: -120px;

  display: flex;

  flex-direction: column; /* 🔥 COLONNA */

  align-items: center;

  gap: 14px;

}

.tag {

  width: 80%;

  padding: 16px;

  border-radius: 18px;

  background: rgba(0,0,0,0.05);

  cursor: pointer;

  font-weight: bold;

  text-align: center;

  transition: 0.2s;

}

.tag:hover {

  background: rgba(0,0,0,0.08);

}

/* SCHERMATA 2 */

.hidden {

  display: none;

}

.comment-screen {

  font-size: 22px;

  font-weight: bold;

  opacity: 0;

  animation: fadeIn 1s ease forwards;

  position: relative;

  top: -156px;

}

.second-container {

  margin-top: -100px; /* 🔥 PIÙ DISTANZA */

  display: flex;

  flex-direction: column;

  align-items: center;

}

.comment-box {

  width: 85%;

  padding: 15px;

  border-radius: 18px;

  border: none;

  outline: none;

  background: rgba(0,0,0,0.05);

  font-size: 16px;

  resize: none;

  height: 120px;

}

.submit-btn {

  width: 85%;

  margin-top: 15px;

  padding: 16px;

  border-radius: 18px;

  border: none;

  background: black;

  color: white;

  font-size: 20px;

  cursor: pointer;

}

.skip-btn {

  width: 85%;

  margin-top: 18px;

  padding: 16px;

  border-radius: 18px;

  background: rgba(0,0,0,0.05);

  font-size: 16px;

  font-weight: bold;

  cursor: pointer;

}

/* FINALE */

#thankYou {

  position: fixed;

  top: 0;

  left: 0;

  width: 100%;

  height: 100%;

  background: white;

  display: none;

  justify-content: center;

  align-items: center;

  font-size: 24px;

  font-weight: bold;

}

</style>

</head>

<body>

<div class="container">

<!-- SCHERMATA 1 -->

<div id="screen1">

  <div class="logo-wrapper fade-out">

    <img src="logo.png" class="logo">

    <div class="shine"></div>

  </div>

  <div class="question">

    Esperienza oggi ?

  </div>

  <div class="cards">

    <div class="card" onclick="nextStep('Mi piace')">

      <img src="logo1.png">

      <span>Mi piace</span>

    </div>

    <div class="card" onclick="nextStep('Discreta')">

      <img src="logo2.png">

      <span>Discreta</span>

    </div>

    <div class="card" onclick="nextStep('Non mi piace')">

      <img src="logo3.png">

      <span>Non mi piace</span>

    </div>

  </div>

</div>

<!-- 🔥 TAG -->

<div id="screenTags" class="hidden">

  <div class="comment-screen">

    Cosa possiamo migliorare?

  </div>

  <div class="tags-container">

    <div class="tag" onclick="selectTag('🧼 Pulizia')">🧼 Pulizia</div>

    <div class="tag" onclick="selectTag('🧻 Materiali (carta, sapone)')">🧻 Materiali (carta, sapone)</div>

    <div class="tag" onclick="selectTag('🔧 Guasti (rotture)')">🔧 Guasti (rotture)</div>

    <div class="tag" onclick="selectTag('🛋️ Confort')">🛋️ Confort</div>

    <div class="tag" onclick="selectTag('❓ Altro')">❓ Altro</div>

  </div>

</div>

<!-- SCHERMATA 2 -->

<div id="screen2" class="hidden">

  <div class="comment-screen">

    Commenterai la tua esperienza ?

  </div>

  <div class="second-container">

    <textarea id="feedbackText" class="comment-box"

      placeholder="Scrivi qui la tua esperienza..."></textarea>

    <button class="submit-btn" onclick="sendFeedback()">→</button>

    <div class="skip-btn" onclick="sendFeedback()">Non commento</div>

  </div>

</div>

</div>

<div id="thankYou">

  Grazie per il feedback 😃

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import { getFirestore, collection, addDoc, serverTimestamp } 

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIza...",

  authDomain: "experience-3edff.firebaseapp.com",

  projectId: "experience-3edff",

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const businessId = new URLSearchParams(window.location.search).get("businessId");

let sceltaUtente = "";

let tagSelezionato = "";

/* STEP 1 */

window.nextStep = function (scelta) {

  sceltaUtente = scelta;

  document.getElementById("screen1").style.display = "none";

  document.getElementById("screenTags").classList.remove("hidden");

};

/* CLICK TAG → PASSA SUBITO */

window.selectTag = function(tag) {

  tagSelezionato = tag;

  document.getElementById("screenTags").style.display = "none";

  document.getElementById("screen2").classList.remove("hidden");

};

/* INVIO */

window.sendFeedback = async function () {

  const text = document.getElementById("feedbackText").value;

  try {

    await addDoc(collection(db, "feedback"), {

      text: text,

      scelta: sceltaUtente,

      tag: tagSelezionato,

      businessId: businessId, // 🔥 AGGIUNTO

      timestamp: serverTimestamp()

    });

    document.getElementById("screen2").style.display = "none";

    document.getElementById("thankYou").style.display = "flex";

  } catch (e) {

    console.error("Errore:", e);

  }

};

</script>

</body>

</html>
