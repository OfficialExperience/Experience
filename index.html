<!DOCTYPE html>

<html lang="it">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Feedback</title>

  <style>

    body {

      margin: 0;

      background: white;

      font-family: Arial, sans-serif;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

      overflow: hidden;

    }

    .container {

      width: 100%;

      max-width: 400px;

      text-align: center;

      position: relative;

      transform: translateY(-40px);

    }

    /* LOGO */

    .logo-wrapper {

      position: relative;

      display: inline-block;

    }

    .logo {

      width: 110px;

      display: block;

    }

    /* LUCE */

    .shine {

      position: absolute;

      top: 0;

      left: -100%;

      width: 100%;

      height: 100%;

      background: linear-gradient(

        120deg,

        transparent 0%,

        rgba(255,255,255,0.8) 50%,

        transparent 100%

      );

      animation: shineMove 1.5s ease forwards;

    }

    @keyframes shineMove {

      0% { left: -100%; }

      100% { left: 100%; }

    }

    /* SCOMPARSA LOGO */

    .fade-out {

      animation: fadeOut 0.8s ease forwards;

      animation-delay: 1.5s;

    }

    @keyframes fadeOut {

      to {

        opacity: 0;

        transform: scale(1.1);

      }

    }

    /* DOMANDA */

    .question {

      position: absolute;

      top: -170%;

      left: 50%;

      transform: translateX(-50%);

      opacity: 0;

      font-size: 22px;

      white-space: nowrap;

      font-weight: bold;

      animation: fadeIn 1s ease forwards;

      animation-delay: 2.3s;

    }

    @keyframes fadeIn {

      to { opacity: 1; }

    }

    /* CONTENITORE COLONNE */

    .cards {

      position: absolute;

      top: -80%;

      width: 100%;

      display: flex;

      flex-direction: column;

      align-items: center;

      opacity: 0;

      animation: fadeIn 1s ease forwards;

      animation-delay: 2.8s;

    }

    /* CARD */

    .card {

      width: 82%;

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 28px 22px;

      margin: 14px 0;

      border-radius: 20px;

      background: rgba(0,0,0,0.05);

      backdrop-filter: blur(6px);

      cursor: pointer;

      transition: transform 0.2s ease, background 0.2s ease;

    }

    .card:hover {

      transform: scale(1.05);

      background: rgba(0,0,0,0.08);

    }

    .card img {

      width: 70px;

      height: 70px;

    }

    .card span {

      flex: 1;

      text-align: right;

      font-size: 17px;

      font-weight: bold;

    }

    /* SECONDA SCHERMATA */

    .hidden {

      display: none;

    }

    .comment-screen {

      opacity: 0;

      font-size: 22px;

      font-weight: bold;

      animation: fadeIn 1s ease forwards;

    }

  </style>

</head>

<body>

<div class="container">

  <!-- SCHERMATA 1 -->

  <div id="screen1">

    <!-- LOGO -->

    <div class="logo-wrapper fade-out">

      <img src="logo.png" class="logo">

      <div class="shine"></div>

    </div>

    <!-- DOMANDA -->

    <div class="question">

      Esperienza oggi all’università?

    </div>

    <!-- COLONNE -->

    <div class="cards">

      <div class="card" onclick="nextStep()">

        <img src="logo1.png">

        <span>Mi piace</span>

      </div>

      <div class="card" onclick="nextStep()">

        <img src="logo2.png">

        <span>Discreta</span>

      </div>

      <div class="card" onclick="nextStep()">

        <img src="logo3.png">

        <span>Non mi piace</span>

      </div>

    </div>

  </div>

  <!-- SCHERMATA 2 -->

  <div id="screen2" class="hidden">

    <div class="comment-screen">

      Commenterai la tua esperienza

    </div>

  </div>

</div>

<script>

  function nextStep() {

    document.getElementById("screen1").style.display = "none";

    document.getElementById("screen2").classList.remove("hidden");

  }

</script>

</body>

</html>
