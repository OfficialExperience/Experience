<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Dashboard</title>

<style>

body {

  margin: 0;

  background: white;

  font-family: Arial, sans-serif;

  display: flex;

  justify-content: center;

  align-items: center;

  height: 100vh;

  overflow: hidden;

}

/* 🔥 CONTAINER */

.login-container {

  width: 90%;

  max-width: 420px;

  text-align: center;

}

/* 🔥 LOGO */

.logo-wrapper {

  position: relative;

  display: inline-block;

  margin-bottom: 25px;

}

.logo {

  width: 120px;

  display: block;

}

/* 🔥 LUCE */

.shine {

  position: absolute;

  top: 0;

  left: -100%;

  width: 100%;

  height: 100%;

  background: linear-gradient(

    120deg,

    transparent 0%,

    rgba(255,255,255,0.8) 50%,

    transparent 100%

  );

  animation: shineMove 2.5s ease-in-out infinite;

  }

@keyframes shineMove {

  0% {

    left: -100%;

  }

  100% {

    left: 100%;

  }

}

/* 🔥 TITOLO */

h2 {

  font-size: 34px;

  margin-bottom: 35px;

}

/* 🔥 INPUT */

.input-box {

  width: 100%;

  padding: 20px;

  margin-bottom: 18px;

  border: none;

  border-radius: 22px;

  background: rgba(0,0,0,0.05);

  font-size: 18px;

  outline: none;

  box-sizing: border-box;

  transition: 0.2s;

}

.input-box:focus {

  background: rgba(0,0,0,0.08);

}

/* 🔥 BOTTONE LOGIN */

.login-btn {

  width: 100%;

  padding: 20px;

  border: none;

  border-radius: 22px;

  background: black;

  color: white;

  font-size: 20px;

  font-weight: bold;

  cursor: pointer;

  transition: 0.2s;

}

.login-btn:hover {

  transform: scale(1.03);

}

/* 🔥 ERRORE */

#error {

  margin-top: 20px;

  color: red;

  font-weight: bold;

  font-size: 16px;

}

</style>

</head>

<body>

<div class="login-container">

  <!-- 🔥 LOGO -->

  <div class="logo-wrapper">

    <img src="logo.png" class="logo">

    <div class="shine"></div>

  </div>

  <!-- 🔥 TITOLO -->

  <h2>Login Dashboard</h2>

  <!-- 🔥 EMAIL -->

  <input

    id="email"

    class="input-box"

    placeholder="E-mail"

  >

  <!-- 🔥 PASSWORD -->

  <input

    id="password"

    type="password"

    class="input-box"

    placeholder="Password"

  >

  <!-- 🔥 LOGIN -->

  <button

    class="login-btn"

    onclick="login()"

  >

    Login

  </button>

  <p id="error"></p>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

  getAuth,

  signInWithEmailAndPassword,

  setPersistence,

  browserLocalPersistence

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* 🔥 FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDot8DBEW_O9WAIEPiatS8Nqoc8qd9SNO4",

  authDomain: "experience-3edff.firebaseapp.com",

  projectId: "experience-3edff",

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* 🔥 LOGIN PERSISTENTE */

setPersistence(auth, browserLocalPersistence);

/* 🔥 LOGIN */

window.login = async function() {

  const email =

    document.getElementById("email").value;

  const pass =

    document.getElementById("password").value;

  try {

    await signInWithEmailAndPassword(

      auth,

      email,

      pass

    );

    /* 🔥 BUSINESS */

    let business = "";

    if (email === "unime@gmail.com") {                      

      business = "unime_messina";

    }

     if (email === "unime@prova1.com") {

      business = "unime_prova1";

    }

    if (email === "demo@experience.com") {

      business = "demo_experience";

    }


    /* 🔥 REDIRECT */

    setTimeout(() => {

      window.location.href =

        "dashboard.html?business=" + business;

    }, 300);

  } catch (e) {

    document.getElementById("error").innerText =

      "Login errato";

    console.log(e);

  }

};

</script>

</body>

</html>
